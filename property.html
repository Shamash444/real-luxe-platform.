<!-- Property Page Styles -->
<style>
/* ─── HERO GALLERY ─── */
.pp-hero{position:relative;width:100%;height:clamp(400px,60vh,700px);overflow:hidden;background:var(--charcoal)}
.pp-hero-img{width:100%;height:100%;object-fit:cover;transition:opacity .6s var(--ease)}
.pp-hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,10,.1) 0%,rgba(10,10,10,.05) 50%,rgba(10,10,10,.45) 100%);pointer-events:none}
.pp-hero-counter{position:absolute;bottom:24px;right:24px;padding:8px 16px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border-radius:var(--radius-pill);font-size:11px;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,.9)}

.pp-thumbs{display:flex;gap:8px;padding:12px var(--gutter);overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;scrollbar-width:none;background:var(--ivory)}
.pp-thumbs::-webkit-scrollbar{display:none}
.pp-thumb{flex:0 0 auto;width:110px;height:80px;border-radius:var(--radius);overflow:hidden;cursor:pointer;opacity:.45;transition:all .4s var(--ease);border:2px solid transparent;scroll-snap-align:start}
.pp-thumb:hover,.pp-thumb.active{opacity:1;border-color:var(--gold)}
.pp-thumb img{width:100%;height:100%;object-fit:cover}

/* ─── PAGE BODY ─── */
.pp-body{max-width:1200px;margin:0 auto;padding:48px var(--gutter) 80px}

/* ─── TITLE BLOCK ─── */
.pp-title-block{margin-bottom:40px}
.pp-tag{display:inline-block;padding:5px 14px;background:rgba(198,165,92,.1);border-radius:var(--radius-pill);font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dark);margin-bottom:16px}
.pp-name{font-family:var(--font-display);font-size:clamp(32px,5vw,56px);font-weight:400;line-height:1.1;letter-spacing:-1px;color:var(--charcoal);margin-bottom:12px}
.pp-meta{display:flex;align-items:center;flex-wrap:wrap;gap:20px}
.pp-location{display:flex;align-items:center;gap:6px;color:var(--slate);font-size:14px;letter-spacing:.5px}
.pp-location svg{color:var(--gold);flex-shrink:0}
.pp-price{font-family:var(--font-display);font-size:clamp(28px,3.5vw,44px);color:var(--gold-dark);font-weight:400;margin-left:auto}

/* ─── SPECS BAR ─── */
.pp-specs{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:16px;margin-bottom:48px;padding:28px 0;border-top:1px solid var(--cream);border-bottom:1px solid var(--cream)}
.pp-spec{text-align:center;padding:12px 8px}
.pp-spec-icon{margin-bottom:8px;color:var(--gold)}
.pp-spec-value{font-family:var(--font-display);font-size:24px;color:var(--charcoal);line-height:1;margin-bottom:6px}
.pp-spec-label{font-size:9px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--mist)}

/* ─── DESCRIPTION TABS ─── */
.pp-desc-tabs{display:flex;gap:0;margin-bottom:20px}
.pp-desc-tab{padding:10px 24px;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--mist);border-bottom:2px solid transparent;cursor:pointer;transition:all .3s}
.pp-desc-tab.active{color:var(--charcoal);border-bottom-color:var(--gold)}
.pp-desc-tab:hover{color:var(--charcoal)}
.pp-desc-content{font-size:15px;color:var(--slate);line-height:2;max-width:800px;margin-bottom:48px}
.pp-desc-panel{display:none}
.pp-desc-panel.active{display:block}

/* ─── SECTION TITLES ─── */
.pp-section-title{font-family:var(--font-display);font-size:22px;font-weight:400;color:var(--charcoal);margin-bottom:24px;display:flex;align-items:center;gap:10px}
.pp-section-title svg{color:var(--gold)}

/* ─── ROI / INVESTMENT ─── */
.pp-data-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-bottom:48px}
.pp-data-card{padding:28px;background:var(--white);border:1px solid var(--cream);border-radius:var(--radius-lg);transition:all .3s}
.pp-data-card:hover{border-color:var(--gold);box-shadow:0 8px 32px rgba(198,165,92,.08)}
.pp-data-card h4{font-family:var(--font-display);font-size:16px;font-weight:400;color:var(--charcoal);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.pp-data-card h4 svg{color:var(--gold);flex-shrink:0}
.pp-data-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.04);font-size:13px}
.pp-data-item:last-child{border-bottom:none}
.pp-data-item .label{color:var(--slate)}
.pp-data-item .value{font-weight:600;color:var(--charcoal)}

/* ─── CONFOTUR BADGE ─── */
.pp-confotur{display:flex;align-items:flex-start;gap:12px;padding:20px 24px;background:rgba(198,165,92,.06);border:1px solid rgba(198,165,92,.18);border-radius:var(--radius);font-size:13px;color:var(--gold-dark);line-height:1.7;margin-bottom:48px}
.pp-confotur svg{flex-shrink:0;margin-top:2px;color:var(--gold)}

/* ─── AMENITIES ─── */
.pp-amenities{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:48px}
.pp-amenity{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--white);border:1px solid var(--cream);border-radius:var(--radius);font-size:13px;color:var(--charcoal);transition:all .3s}
.pp-amenity:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 16px rgba(198,165,92,.08)}
.pp-amenity-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0}

/* ─── CONCIERGE ─── */
.pp-concierge{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:48px}
.pp-concierge-item{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--ivory);border-radius:var(--radius);font-size:13px;color:var(--charcoal);transition:all .3s}
.pp-concierge-item:hover{background:rgba(198,165,92,.06);transform:translateY(-2px)}
.pp-concierge-item::before{content:'\2726';color:var(--gold);font-size:10px}

/* ─── MAP ─── */
.pp-map{width:100%;height:360px;border-radius:var(--radius-lg);overflow:hidden;margin-bottom:48px;border:1px solid var(--cream);position:relative;z-index:1}
.pp-map .leaflet-control-attribution{font-size:9px;opacity:.6}

/* ─── CTA SECTION ─── */
.pp-cta{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:60px;padding-top:20px}
.pp-cta-btn{flex:1;min-width:220px;justify-content:center}

/* ─── LEAD FORM (inline) ─── */
.pp-lead-section{background:var(--white);border:1px solid var(--cream);border-radius:var(--radius-lg);padding:48px;margin-bottom:60px}
.pp-lead-header{text-align:center;margin-bottom:32px}
.pp-lead-header h3{font-family:var(--font-display);font-size:28px;font-weight:400;color:var(--charcoal);margin-bottom:8px}
.pp-lead-header p{font-size:14px;color:var(--slate);max-width:460px;margin:0 auto}
.pp-lead-form{max-width:560px;margin:0 auto}
.pp-field{margin-bottom:20px}
.pp-field label{display:block;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--charcoal);margin-bottom:8px}
.pp-field input,.pp-field textarea{width:100%;padding:14px 18px;background:var(--ivory);border:1px solid var(--cream);border-radius:var(--radius);font-size:14px;color:var(--charcoal);transition:border-color .3s;outline:none}
.pp-field input:focus,.pp-field textarea:focus{border-color:var(--gold)}
.pp-lead-submit{width:100%;padding:16px;background:var(--gold);color:var(--black);font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;border:2px solid var(--gold);border-radius:var(--radius-pill);cursor:pointer;transition:all .4s var(--ease);display:flex;align-items:center;justify-content:center;gap:10px}
.pp-lead-submit:hover{background:var(--gold-dark);border-color:var(--gold-dark);color:var(--white);transform:translateY(-2px);box-shadow:0 12px 40px rgba(198,165,92,.3)}
.pp-lead-success{text-align:center;padding:40px 20px;display:none}
.pp-lead-success svg{color:var(--gold);margin-bottom:16px}
.pp-lead-success h4{font-family:var(--font-display);font-size:22px;margin-bottom:8px;color:var(--charcoal)}
.pp-lead-success p{color:var(--slate);font-size:14px}

/* ─── LOADING / ERROR ─── */
.pp-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.pp-loading-spinner{width:40px;height:40px;border:3px solid var(--cream);border-top-color:var(--gold);border-radius:50%;animation:pp-spin .8s linear infinite}
@keyframes pp-spin{to{transform:rotate(360deg)}}
.pp-loading-text{font-size:14px;color:var(--slate);letter-spacing:.05em;text-transform:uppercase}
.pp-not-found{text-align:center;padding:120px 20px 80px;min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.pp-not-found h2{font-family:var(--font-display);font-size:36px;color:var(--charcoal);margin-bottom:12px}
.pp-not-found p{color:var(--slate);margin-bottom:32px;font-size:15px}
.pp-not-found a{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:var(--gold);color:var(--black);font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;border-radius:var(--radius-pill);transition:all .4s}
.pp-not-found a:hover{background:var(--gold-dark);color:var(--white);transform:translateY(-2px)}

/* ─── RESPONSIVE ─── */
@media(max-width:768px){
  .pp-data-grid{grid-template-columns:1fr}
  .pp-specs{grid-template-columns:repeat(3,1fr)}
  .pp-meta{flex-direction:column;align-items:flex-start;gap:12px}
  .pp-price{margin-left:0}
  .pp-cta{flex-direction:column}
  .pp-lead-section{padding:32px 20px}
  .pp-thumb{width:85px;height:65px}
  .pp-hero{height:clamp(280px,45vh,500px)}
}
@media(max-width:480px){
  .pp-specs{grid-template-columns:repeat(2,1fr)}
  .pp-amenities{grid-template-columns:1fr}
  .pp-concierge{grid-template-columns:1fr}
  .pp-thumb{width:70px;height:55px}
}
</style>

<script>
(function(){
  /* ═══ CONFIG ═══ */
  const SUPABASE_URL = 'https://bfwygmxebrlspimhobpa.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmd3lnbXhlYnJsc3BpbWhvYnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk4MzA2NjEsImV4cCI6MjA2NTQwNjY2MX0.eS6WKMnpfRwVGwbs3CiH3IL1JBceKFm1FfqLnkYeMk4';
  const WA_NUMBER = '61436007811';

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const slug = new URLSearchParams(window.location.search).get('slug');
  const main = document.getElementById('ppMain');

  /* ═══ HELPERS ═══ */
  function fmtPrice(n) {
    if (!n) return 'Price on Request';
    return '$' + Number(n).toLocaleString('en-US');
  }

  function setMeta(prop) {
    const title = prop.name + ' — Real Luxe';
    document.title = title;
    document.getElementById('ogTitle').setAttribute('content', title);
    document.getElementById('ogDesc').setAttribute('content', (prop.description_en || prop.description_fr || '').substring(0, 160));
    const img = (prop.images && prop.images.length) ? prop.images[0] : (prop.image_url || '');
    document.getElementById('ogImage').setAttribute('content', img);
    document.getElementById('ogUrl').setAttribute('content', window.location.href);
  }

  /* ═══ NOT FOUND ═══ */
  function showNotFound() {
    main.innerHTML = `
      <div class="pp-not-found">
        <h2>Property Not Found</h2>
        <p>This property may no longer be available or the link may be incorrect.</p>
        <a href="catalogue.html">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Browse Collection
        </a>
      </div>`;
    document.getElementById('propHeaderName').textContent = 'Not Found';
  }

  /* ═══ BUILD GALLERY ═══ */
  function buildGallery(images) {
    if (!images || !images.length) return '';
    const mainSrc = images[0];
    let thumbsHTML = images.map((src, i) =>
      `<div class="pp-thumb${i === 0 ? ' active' : ''}" data-idx="${i}" onclick="switchImage(${i})">
        <img src="${src}" alt="Thumbnail ${i + 1}" loading="lazy">
      </div>`
    ).join('');

    return `
      <div class="pp-hero" id="ppHero">
        <img class="pp-hero-img" id="ppHeroImg" src="${mainSrc}" alt="Property main image">
        <div class="pp-hero-overlay"></div>
        <div class="pp-hero-counter" id="ppCounter">1 / ${images.length}</div>
      </div>
      <div class="pp-thumbs" id="ppThumbs">${thumbsHTML}</div>`;
  }

  /* ═══ BUILD SPECS ═══ */
  function buildSpecs(p) {
    const specs = [];
    if (p.bedrooms) specs.push({ val: p.bedrooms, label: 'Bedrooms', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7v11m0-4h18m0 4V11a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4m18 7H3m1-11V4a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v3m4 0V4a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v3"/></svg>' });
    if (p.bathrooms) specs.push({ val: p.bathrooms, label: 'Bathrooms', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 12h16a1 1 0 0 1 1 1v3a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4v-3a1 1 0 0 1 1-1zM6 12V5a2 2 0 0 1 2-2h1"/></svg>' });
    if (p.area_sqm) specs.push({ val: p.area_sqm.toLocaleString(), label: 'SQM', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>' });
    if (p.area_sqft || p.area_sqm) {
      const sqft = p.area_sqft || Math.round(p.area_sqm * 10.7639);
      specs.push({ val: sqft.toLocaleString(), label: 'SQFT', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>' });
    }
    if (p.lot_size) specs.push({ val: p.lot_size, label: 'Lot Size', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 21L3 3l7 4 4-4 7 4v18l-7-4-4 4-7-4z"/></svg>' });
    if (p.year_built) specs.push({ val: p.year_built, label: 'Year Built', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>' });
    if (p.pool || p.has_pool) specs.push({ val: 'Yes', label: 'Pool', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12c2-2 4-2 6 0s4 2 6 0 4-2 6 0M2 18c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/></svg>' });
    if (p.parking) specs.push({ val: p.parking, label: 'Parking', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 17V7h4a3 3 0 0 1 0 6H9"/></svg>' });

    if (!specs.length) return '';
    return `<div class="pp-specs">${specs.map(s =>
      `<div class="pp-spec">
        <div class="pp-spec-icon">${s.icon}</div>
        <div class="pp-spec-value">${s.val}</div>
        <div class="pp-spec-label">${s.label}</div>
      </div>`
    ).join('')}</div>`;
  }

  /* ═══ BUILD DESCRIPTION TABS ═══ */
  function buildDescription(p) {
    const en = p.description_en || p.description || '';
    const fr = p.description_fr || '';
    if (!en && !fr) return '';

    if (!fr) {
      return `<div class="pp-desc-content"><p>${en}</p></div>`;
    }

    return `
      <div class="pp-desc-tabs">
        <button class="pp-desc-tab active" onclick="switchDescTab('en',this)">English</button>
        <button class="pp-desc-tab" onclick="switchDescTab('fr',this)">Fran\u00e7ais</button>
      </div>
      <div class="pp-desc-content">
        <div class="pp-desc-panel active" id="descEn"><p>${en}</p></div>
        <div class="pp-desc-panel" id="descFr"><p>${fr}</p></div>
      </div>`;
  }

  /* ═══ BUILD ROI / INVESTMENT ═══ */
  function buildROI(p) {
    const hasROI = p.roi_gross || p.roi_net || p.rental_income_monthly || p.rental_income_yearly || p.occupancy_rate || p.cap_rate;
    const hasTax = p.annual_taxes || p.hoa_fees || p.transfer_tax || p.closing_costs;
    if (!hasROI && !hasTax) return '';

    let html = '<div class="pp-data-grid">';

    if (hasROI) {
      html += `<div class="pp-data-card"><h4>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Investment Returns</h4>`;
      if (p.roi_gross) html += `<div class="pp-data-item"><span class="label">Gross ROI</span><span class="value">${p.roi_gross}%</span></div>`;
      if (p.roi_net) html += `<div class="pp-data-item"><span class="label">Net ROI</span><span class="value">${p.roi_net}%</span></div>`;
      if (p.cap_rate) html += `<div class="pp-data-item"><span class="label">Cap Rate</span><span class="value">${p.cap_rate}%</span></div>`;
      if (p.occupancy_rate) html += `<div class="pp-data-item"><span class="label">Occupancy Rate</span><span class="value">${p.occupancy_rate}%</span></div>`;
      if (p.rental_income_monthly) html += `<div class="pp-data-item"><span class="label">Monthly Revenue</span><span class="value">${fmtPrice(p.rental_income_monthly)}</span></div>`;
      if (p.rental_income_yearly) html += `<div class="pp-data-item"><span class="label">Annual Revenue</span><span class="value">${fmtPrice(p.rental_income_yearly)}</span></div>`;
      html += '</div>';
    }

    if (hasTax) {
      html += `<div class="pp-data-card"><h4>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Costs & Taxes</h4>`;
      if (p.annual_taxes) html += `<div class="pp-data-item"><span class="label">Annual Taxes</span><span class="value">${fmtPrice(p.annual_taxes)}</span></div>`;
      if (p.hoa_fees) html += `<div class="pp-data-item"><span class="label">HOA / Maintenance</span><span class="value">${fmtPrice(p.hoa_fees)}/mo</span></div>`;
      if (p.transfer_tax) html += `<div class="pp-data-item"><span class="label">Transfer Tax</span><span class="value">${p.transfer_tax}%</span></div>`;
      if (p.closing_costs) html += `<div class="pp-data-item"><span class="label">Closing Costs</span><span class="value">${p.closing_costs}</span></div>`;
      html += '</div>';
    }

    html += '</div>';
    return html;
  }

  /* ═══ BUILD CONFOTUR ═══ */
  function buildConfotur(p) {
    if (!p.confotur && !p.confotur_text) return '';
    const text = p.confotur_text || 'This property qualifies for CONFOTUR tax benefits: 100% exemption on property transfer taxes, annual property taxes, and income from rentals for up to 15 years.';
    return `
      <div class="pp-confotur">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span>${text}</span>
      </div>`;
  }

  /* ═══ BUILD AMENITIES ═══ */
  function buildAmenities(p) {
    const list = p.amenities || [];
    if (!list.length) return '';
    return `
      <h3 class="pp-section-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        Amenities &amp; Features
      </h3>
      <div class="pp-amenities">${list.map(a =>
        `<div class="pp-amenity"><span class="pp-amenity-dot"></span>${a}</div>`
      ).join('')}</div>`;
  }

  /* ═══ BUILD CONCIERGE ═══ */
  function buildConcierge(p) {
    const list = p.concierge_services || p.concierge || [];
    if (!list.length) return '';
    return `
      <h3 class="pp-section-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Lifestyle Concierge
      </h3>
      <div class="pp-concierge">${list.map(c =>
        `<div class="pp-concierge-item">${c}</div>`
      ).join('')}</div>`;
  }

  /* ═══ BUILD MAP ═══ */
  function buildMap(p) {
    const lat = p.latitude || p.lat;
    const lng = p.longitude || p.lng || p.lon;
    if (!lat || !lng) return '';
    return `
      <h3 class="pp-section-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Location
      </h3>
      <div class="pp-map" id="ppMap"></div>`;
  }

  /* ═══ BUILD CTA + LEAD FORM ═══ */
  function buildCTA(p) {
    const waMsg = encodeURIComponent('Hello, I am interested in ' + (p.name || 'your property') + '. Could you provide more information?');
    return `
      <div class="pp-cta">
        <button class="btn-primary pp-cta-btn" onclick="document.getElementById('ppLeadSection').scrollIntoView({behavior:'smooth'})">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          Schedule a Private Viewing
        </button>
        <a href="https://wa.me/${WA_NUMBER}?text=${waMsg}" target="_blank" rel="noopener" class="btn-ghost pp-cta-btn" style="color:var(--charcoal);border-color:var(--cream);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Contact on WhatsApp
        </a>
      </div>`;
  }

  function buildLeadForm(p) {
    return `
      <div class="pp-lead-section" id="ppLeadSection">
        <div class="pp-lead-header">
          <h3>Private Consultation</h3>
          <p>Our team will contact you within 24 hours for a personalized experience.</p>
        </div>
        <div id="ppLeadFormWrap">
          <form class="pp-lead-form" id="ppLeadForm" onsubmit="return submitPPLead(event)">
            <input type="hidden" id="ppLeadSlug" value="${p.slug || ''}">
            <input type="hidden" id="ppLeadPropName" value="${(p.name || '').replace(/"/g,'&quot;')}">
            <div class="pp-field">
              <label>Full Name</label>
              <input type="text" id="ppLeadName" required autocomplete="name" placeholder="Your full name">
            </div>
            <div class="pp-field">
              <label>Email</label>
              <input type="email" id="ppLeadEmail" required autocomplete="email" placeholder="your@email.com">
            </div>
            <div class="pp-field">
              <label>Phone</label>
              <input type="tel" id="ppLeadPhone" required autocomplete="tel" placeholder="+1 (555) 000-0000">
            </div>
            <div class="pp-field">
              <label>Message</label>
              <textarea id="ppLeadMsg" rows="3" placeholder="I am interested in scheduling a private viewing..."></textarea>
            </div>
            <button type="submit" class="pp-lead-submit" id="ppLeadSubmitBtn">
              <span>Send Request</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            </button>
          </form>
        </div>
        <div class="pp-lead-success" id="ppLeadSuccess">
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <h4>VIP Request Transmitted</h4>
          <p>Our concierge team has been notified and will contact you shortly.</p>
        </div>
      </div>`;
  }

  /* ═══ RENDER PAGE ═══ */
  function render(p) {
    setMeta(p);
    document.getElementById('propHeaderName').textContent = p.name || '';

    const images = p.images && p.images.length ? p.images : (p.image_url ? [p.image_url] : []);

    main.innerHTML =
      buildGallery(images) +
      '<div class="pp-body">' +
        /* Title block */
        '<div class="pp-title-block">' +
          (p.tag ? `<div class="pp-tag">${p.tag}</div>` : '') +
          `<h1 class="pp-name">${p.name || 'Untitled Property'}</h1>` +
          '<div class="pp-meta">' +
            `<div class="pp-location">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <span>${p.location || p.city || 'Dominican Republic'}</span>
            </div>` +
            `<div class="pp-price">${fmtPrice(p.price)}</div>` +
          '</div>' +
        '</div>' +
        buildSpecs(p) +
        buildDescription(p) +
        buildROI(p) +
        buildConfotur(p) +
        buildAmenities(p) +
        buildConcierge(p) +
        buildMap(p) +
        buildCTA(p) +
        buildLeadForm(p) +
      '</div>';

    /* Init Leaflet map */
    const lat = p.latitude || p.lat;
    const lng = p.longitude || p.lng || p.lon;
    if (lat && lng && document.getElementById('ppMap')) {
      requestAnimationFrame(function() {
        try {
          const map = L.map('ppMap', { scrollWheelZoom: false }).setView([lat, lng], 14);
          L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            maxZoom: 19
          }).addTo(map);
          const goldIcon = L.divIcon({
            className: '',
            html: '<div style="width:20px;height:20px;background:var(--gold,#C6A55C);border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.25)"></div>',
            iconSize: [20, 20],
            iconAnchor: [10, 10]
          });
          L.marker([lat, lng], { icon: goldIcon }).addTo(map)
            .bindPopup('<strong>' + (p.name || '') + '</strong><br>' + (p.location || ''));
        } catch(e) { console.warn('Map init error:', e); }
      });
    }

    /* Store images for gallery switching */
    window._ppImages = images;
  }

  /* ═══ GALLERY SWITCH ═══ */
  window.switchImage = function(idx) {
    const images = window._ppImages || [];
    if (!images[idx]) return;
    const heroImg = document.getElementById('ppHeroImg');
    if (heroImg) {
      heroImg.style.opacity = '0';
      setTimeout(function() {
        heroImg.src = images[idx];
        heroImg.style.opacity = '1';
      }, 300);
    }
    document.querySelectorAll('.pp-thumb').forEach(function(t, i) {
      t.classList.toggle('active', i === idx);
    });
    const counter = document.getElementById('ppCounter');
    if (counter) counter.textContent = (idx + 1) + ' / ' + images.length;
  };

  /* ═══ DESCRIPTION TAB SWITCH ═══ */
  window.switchDescTab = function(lang, btn) {
    document.querySelectorAll('.pp-desc-tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.pp-desc-panel').forEach(function(p) { p.classList.remove('active'); });
    btn.classList.add('active');
    var panel = document.getElementById(lang === 'fr' ? 'descFr' : 'descEn');
    if (panel) panel.classList.add('active');
  };

  /* ═══ LEAD FORM SUBMIT ═══ */
  window.submitPPLead = async function(e) {
    e.preventDefault();
    const btn = document.getElementById('ppLeadSubmitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span>Sending...</span>';

    const payload = {
      name: document.getElementById('ppLeadName').value.trim(),
      email: document.getElementById('ppLeadEmail').value.trim(),
      phone: document.getElementById('ppLeadPhone').value.trim(),
      message: document.getElementById('ppLeadMsg').value.trim(),
      property_slug: document.getElementById('ppLeadSlug').value,
      property_name: document.getElementById('ppLeadPropName').value,
      source: 'property_page',
      created_at: new Date().toISOString()
    };

    try {
      await sb.from('leads').insert([payload]);
    } catch(err) {
      console.warn('Lead save error:', err);
    }

    document.getElementById('ppLeadFormWrap').style.display = 'none';
    document.getElementById('ppLeadSuccess').style.display = 'block';
    return false;
  };

  /* ═══ HEADER SCROLL ═══ */
  window.addEventListener('scroll', function() {
    var header = document.getElementById('catHeader');
    if (header) header.classList.toggle('scrolled', window.scrollY > 40);
  }, { passive: true });

  /* ═══ FETCH & INIT ═══ */
  async function init() {
    if (!slug) { showNotFound(); return; }

    const { data, error } = await sb
      .from('properties')
      .select('*')
      .eq('slug', slug)
      .eq('status', 'published')
      .single();

    if (error || !data) { showNotFound(); return; }

    render(data);
  }

  init();
})();
</script>
</body>
</html>
