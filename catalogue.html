<style>
/* ===================================================================
   REAL LUXE CATALOGUE — ULTRA-LUXURY DESIGN SYSTEM
   =================================================================== */
:root{
  --gold:#C6A55C;
  --gold-light:#D4B978;
  --gold-dark:#A88B3D;
  --ivory:#FAF8F5;
  --cream:#F0EDE7;
  --charcoal:#1A1A1A;
  --graphite:#2D2D2D;
  --slate:#6B6B6B;
  --mist:#9A9A9A;
  --white:#FFFFFF;
  --black:#0A0A0A;
  --sea:#1B4D5C;
  --sea-light:#2A7A8C;
  --coral:#D4725C;
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'DM Sans','Helvetica Neue',sans-serif;
  --ease:cubic-bezier(.22,1,.36,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
  --gutter:clamp(20px,4vw,80px);
  --radius:16px;
  --radius-lg:24px;
  --radius-pill:999px;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;overflow-x:hidden}
body{font-family:var(--font-body);font-weight:400;color:var(--charcoal);background:var(--ivory);line-height:1.7;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
img{display:block;max-width:100%;height:auto}
button{border:none;background:none;cursor:pointer;font-family:inherit}
a{text-decoration:none;color:inherit}

/* === CURSOR === */
.cursor-dot{position:fixed;width:8px;height:8px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:10000;mix-blend-mode:difference;transition:transform .15s var(--ease)}
.cursor-ring{position:fixed;width:40px;height:40px;border-radius:50%;pointer-events:none;z-index:10000;mix-blend-mode:difference;transition:transform .3s var(--ease),width .3s,height .3s,border-color .3s}
.cursor-ring.hover{width:64px;height:64px;border-color:var(--gold)}
@property --cursor-angle{syntax:'<angle>';initial-value:0deg;inherits:false}
.cursor-ring{border:none;background:conic-gradient(from var(--cursor-angle),var(--gold),var(--gold-light),#E8D5A0,#C9B87A,var(--gold)) border-box;-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 1.5px),#fff calc(100% - 1.5px));mask:radial-gradient(farthest-side,transparent calc(100% - 1.5px),#fff calc(100% - 1.5px));animation:cursorShimmer 3s linear infinite}
@keyframes cursorShimmer{to{--cursor-angle:360deg}}
.cursor-ring.hover{background:conic-gradient(from var(--cursor-angle),var(--gold),#fff,var(--gold-light),var(--gold)) border-box}

/* === HEADER === */
.cat-header{position:fixed;top:0;left:0;right:0;z-index:200;height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 var(--gutter);transition:all .5s var(--ease)}
.cat-header.scrolled{background:rgba(10,10,10,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 1px 0 rgba(255,255,255,.04)}

.h-logo{font-family:var(--font-display);font-size:22px;font-weight:400;color:var(--white);letter-spacing:6px;text-transform:uppercase;transition:color .4s;flex-shrink:0}
.h-logo span{color:var(--gold);font-style:italic;letter-spacing:2px}

.cat-header-center{position:absolute;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,.5);transition:color .4s;white-space:nowrap}

.cat-header-right{display:flex;align-items:center;gap:16px;flex-shrink:0}

.back-link{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.7);transition:color .3s;display:flex;align-items:center;gap:6px}
.back-link:hover{color:var(--gold)}
.back-link svg{transition:transform .3s}
.back-link:hover svg{transform:translateX(-3px)}

/* === LANGUAGE SELECTOR === */
.lang-sel{position:relative;z-index:201}
.lang-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:var(--radius-pill);font-size:11px;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,.85);transition:all .3s;cursor:pointer}
.lang-btn:hover{border-color:var(--gold);color:var(--gold)}
.lang-btn svg{transition:transform .3s}
.lang-sel.open .lang-btn svg{transform:rotate(180deg)}
.lang-drop{position:absolute;top:calc(100% + 8px);right:0;background:var(--white);border:1px solid var(--cream);border-radius:var(--radius);box-shadow:0 12px 40px rgba(0,0,0,.1);padding:6px;min-width:56px;opacity:0;visibility:hidden;transform:translateY(-8px);transition:all .3s var(--ease);z-index:210}
.lang-sel.open .lang-drop{opacity:1;visibility:visible;transform:translateY(0)}
.lang-opt{display:block;width:100%;padding:8px 12px;border:none;background:none;font-size:11px;font-weight:600;letter-spacing:2px;color:var(--charcoal);cursor:pointer;border-radius:8px;text-align:center;transition:all .2s;font-family:var(--font-body)}
.lang-opt:hover,.lang-opt.active{background:rgba(198,165,92,.1);color:var(--gold)}

/* === HERO === */
.cat-hero{position:relative;height:400px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:var(--black);overflow:hidden;padding:70px var(--gutter) 0}
.cat-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(198,165,92,.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(27,77,92,.08) 0%,transparent 50%),linear-gradient(180deg,rgba(10,10,10,1) 0%,rgba(26,26,26,.95) 100%);z-index:1}
.cat-hero-content{position:relative;z-index:2}

.cat-hero-label{display:inline-flex;align-items:center;gap:8px;font-size:10px;font-weight:600;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
.cat-hero-label::before{content:'';width:32px;height:1px;background:var(--gold)}

.cat-hero-title{font-family:var(--font-display);font-size:clamp(36px,6vw,72px);font-weight:400;color:var(--white);line-height:1.1;letter-spacing:-1px;margin-bottom:20px}
.cat-hero-title em{font-style:italic;color:var(--gold)}

.cat-hero-sub{font-size:clamp(14px,1.3vw,17px);color:var(--mist);line-height:1.8;max-width:560px;margin:0 auto 24px;font-weight:300}

.cat-hero-stats{font-size:13px;font-weight:500;letter-spacing:2px;color:rgba(255,255,255,.5)}

/* === FILTER BAR === */
.filter-bar{position:sticky;top:70px;z-index:150;background:var(--ivory);border-bottom:1px solid var(--cream);padding:0 var(--gutter);transition:box-shadow .3s}
.filter-bar.shadow{box-shadow:0 4px 20px rgba(0,0,0,.04)}
.filter-bar-inner{display:flex;align-items:center;gap:10px;padding:16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}
.filter-bar-inner::-webkit-scrollbar{display:none}

.filter-chip{padding:8px 20px;border-radius:var(--radius-pill);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--slate);border:1px solid var(--cream);background:var(--white);cursor:pointer;transition:all .35s var(--ease);white-space:nowrap;flex-shrink:0}
.filter-chip:hover{border-color:var(--gold-light);color:var(--gold-dark)}
.filter-chip.active{background:var(--gold);border-color:var(--gold);color:var(--black)}

.filter-separator{width:1px;height:24px;background:var(--cream);flex-shrink:0;margin:0 4px}

.sort-chip{padding:8px 20px;border-radius:var(--radius-pill);font-size:11px;font-weight:600;letter-spacing:1px;color:var(--slate);border:1px solid var(--cream);background:var(--white);cursor:pointer;transition:all .35s var(--ease);white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:6px}
.sort-chip:hover{border-color:var(--gold-light);color:var(--gold-dark)}
.sort-chip.active{border-color:var(--gold);color:var(--gold-dark);background:rgba(198,165,92,.06)}
.sort-chip svg{width:12px;height:12px;flex-shrink:0}

/* === PROPERTIES GRID === */
.props-section{padding:clamp(40px,6vh,80px) var(--gutter) clamp(60px,8vh,120px)}
.props-container{max-width:1200px;margin:0 auto}
.props-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:32px}

/* === PROPERTY CARD === */
.cat-card{background:var(--white);border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--cream);transition:all .4s var(--ease)}
.cat-card:hover{border-color:var(--gold);box-shadow:0 20px 60px rgba(198,165,92,.1);transform:translateY(-6px)}

.cat-card-gallery{position:relative;height:320px;overflow:hidden}
.cat-card-gallery img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease)}
.cat-card:hover .cat-card-gallery img{transform:scale(1.05)}

.cat-card-tag{position:absolute;top:16px;left:16px;padding:5px 14px;background:rgba(198,165,92,.92);backdrop-filter:blur(6px);border-radius:var(--radius-pill);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--black);z-index:2}

.cat-card-count{position:absolute;bottom:16px;right:16px;padding:5px 12px;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border-radius:var(--radius-pill);font-size:11px;color:var(--white);display:flex;align-items:center;gap:5px;z-index:2}
.cat-card-count svg{width:14px;height:14px;flex-shrink:0}

.cat-card-thumbs{display:flex;gap:4px;padding:4px 0 0}
.cat-card-thumbs img{flex:1;height:56px;object-fit:cover;border-radius:6px;opacity:.55;transition:opacity .3s;cursor:pointer}
.cat-card-thumbs img:hover{opacity:1}

.cat-card-body{padding:24px 24px 28px}
.cat-card-loc{font-size:10px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--gold-dark);margin-bottom:6px}
.cat-card-name{font-family:var(--font-display);font-size:clamp(20px,1.8vw,24px);color:var(--charcoal);margin-bottom:10px;font-weight:400;line-height:1.2}
.cat-card-desc{font-size:13px;color:var(--slate);line-height:1.7;margin-bottom:18px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.cat-card-stats{display:flex;gap:16px;padding-top:16px;border-top:1px solid var(--cream);flex-wrap:wrap;margin-bottom:18px}
.cat-card-stat{font-size:12px;color:var(--slate);display:flex;align-items:center;gap:5px}
.cat-card-stat strong{color:var(--charcoal);font-weight:600}
.cat-card-stat svg{width:14px;height:14px;color:var(--mist);flex-shrink:0}
.cat-card-bottom{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.cat-card-price{font-family:var(--font-display);font-size:22px;color:var(--gold-dark);font-weight:400}
.cat-card-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;background:var(--charcoal);color:var(--white);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border-radius:var(--radius-pill);transition:all .4s var(--ease);border:1px solid var(--charcoal)}
.cat-card-btn:hover{background:var(--gold);border-color:var(--gold);color:var(--black);transform:scale(1.03)}
.cat-card-btn svg{transition:transform .3s}
.cat-card-btn:hover svg{transform:translateX(3px)}

/* === FOOTER === */
.cat-footer{background:var(--charcoal);padding:clamp(40px,5vh,60px) var(--gutter);color:var(--white)}
.cat-footer-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
.cat-footer-copy{font-size:12px;color:rgba(255,255,255,.35);letter-spacing:1px}
.cat-footer-links{display:flex;align-items:center;gap:24px}
.cat-footer-link{font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);transition:color .3s}
.cat-footer-link:hover{color:var(--gold)}
.cat-footer-wa{display:flex;align-items:center;gap:8px;padding:10px 20px;background:#25D366;color:var(--white);border-radius:var(--radius-pill);font-size:11px;font-weight:600;letter-spacing:1px;transition:all .3s}
.cat-footer-wa:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,211,102,.35)}
.cat-footer-wa svg{flex-shrink:0}

/* === RESPONSIVE === */
@media(max-width:900px){
  .props-grid{grid-template-columns:1fr}
  .cat-card-gallery{height:260px}
  .cat-header-center{display:none}
  .cat-hero{height:350px}
  .cat-footer-inner{flex-direction:column;text-align:center}
  .cat-footer-links{flex-direction:column;gap:16px}
}
@media(max-width:600px){
  .cat-card-gallery{height:240px}
  .cat-card-thumbs img{height:44px}

  .cat-card-bottom{flex-direction:column;align-items:flex-start}
  .cat-card-btn{width:100%;justify-content:center}
  .cat-hero{height:320px;padding-top:70px}
  .cat-hero-title{font-size:clamp(28px,8vw,48px)}
  .back-link span{display:none}
}
@media(pointer:coarse){
  .cursor-dot,.cursor-ring{display:none!important}
}
@media(max-width:480px){
  .cursor-dot,.cursor-ring{display:none!important}
}
</style>

function parsePriceNumber(priceStr) {
  return parseInt(priceStr.replace(/[^0-9]/g, ''), 10);
}

function getT(key) {
  var t = I18N[currentLang];
  return (t && t[key] !== undefined) ? t[key] : (I18N.en[key] || '');
}

/* ===================================================================
   FILTER & SORT
   =================================================================== */
function filterByLocation(location, btn) {
  // Update active chip
  var chips = document.querySelectorAll('.filter-chip');
  for (var i = 0; i < chips.length; i++) {
    chips[i].classList.remove('active');
  }
  btn.classList.add('active');
  activeFilter = location;
  applyFilterSort(true);
}

function sortByPrice(direction, btn) {
  // Toggle sort
  var sortChips = document.querySelectorAll('.sort-chip');
  var wasActive = btn.classList.contains('active');
  for (var i = 0; i < sortChips.length; i++) {
    sortChips[i].classList.remove('active');
  }
  if (wasActive) {
    activeSort = null;
  } else {
    btn.classList.add('active');
    activeSort = direction;
  }
  applyFilterSort(true);
}

function applyFilterSort(animate) {
  // Filter
  var filtered = [];
  for (var i = 0; i < PROPERTIES.length; i++) {
    if (activeFilter === 'all' || PROPERTIES[i].location === activeFilter) {
      filtered.push(PROPERTIES[i]);
    }
  }

  // Sort
  if (activeSort === 'asc') {
    filtered.sort(function(a, b) {
      return parsePriceNumber(a.price) - parsePriceNumber(b.price);
    });
  } else if (activeSort === 'desc') {
    filtered.sort(function(a, b) {
      return parsePriceNumber(b.price) - parsePriceNumber(a.price);
    });
  }

  displayedProperties = filtered;

  if (animate) {
    var grid = document.getElementById('propsGrid');
    var cards = grid.querySelectorAll('.cat-card');
    gsap.to(cards, {
      opacity: 0,
      y: -20,
      duration: 0.3,
      stagger: 0.05,
      ease: 'power2.in',
      onComplete: function() {
        renderCards(true);
      }
    });
  } else {
    renderCards(false);
  }
}

/* ===================================================================
   LANGUAGE
   =================================================================== */
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('rl-lang', lang);
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : lang;
  document.getElementById('currentLangText').textContent = lang.toUpperCase();

  // Update active state in dropdown
  var opts = document.querySelectorAll('.lang-opt');
  for (var i = 0; i < opts.length; i++) {
    if (opts[i].textContent.trim().toLowerCase() === lang) {
      opts[i].classList.add('active');
    } else {
      opts[i].classList.remove('active');
    }
  }

  // Close dropdown
  document.getElementById('langSel').classList.remove('open');

  // Update all data-i18n elements
  var t = I18N[lang];
  if (!t) t = I18N.en;
  var els = document.querySelectorAll('[data-i18n]');
  for (var i = 0; i < els.length; i++) {
    var key = els[i].getAttribute('data-i18n');
    if (t[key] !== undefined) {
      els[i].innerHTML = t[key];
    }
  }

  // Update filter "All" chip text
  var allChip = document.querySelector('[data-i18n-filter="filter_all"]');
  if (allChip && t.filter_all) {
    allChip.textContent = t.filter_all;
  }

  // Re-render cards with new language
  renderCards(false);
}

function toggleLangMenu(e) {
  if (e) e.stopPropagation();
  document.getElementById('langSel').classList.toggle('open');
}

/* ===================================================================
   HEADER SCROLL
   =================================================================== */
function handleScroll() {
  var header = document.getElementById('catHeader');
  var filterBar = document.getElementById('filterBar');
  if (window.scrollY > 50) {
    header.classList.add('scrolled');
  } else {
    header.classList.remove('scrolled');
  }
  if (window.scrollY > 400) {
    filterBar.classList.add('shadow');
  } else {
    filterBar.classList.remove('shadow');
  }
}

/* ===================================================================
   CUSTOM CURSOR
   =================================================================== */
function initCursor() {
  if (window.matchMedia('(pointer:fine)').matches === false) return;

  var dot = document.getElementById('curDot');
  var ring = document.getElementById('curRing');
  if (!dot || !ring) return;

  var mx = -100, my = -100;
  var dx = -100, dy = -100;
  var rx = -100, ry = -100;

  document.addEventListener('mousemove', function(e) {
    mx = e.clientX;
    my = e.clientY;
  });

  function render() {
    dx += (mx - dx) * 0.2;
    dy += (my - dy) * 0.2;
    rx += (mx - rx) * 0.08;
    ry += (my - ry) * 0.08;
    dot.style.transform = 'translate(' + (dx - 4) + 'px,' + (dy - 4) + 'px)';
    ring.style.transform = 'translate(' + (rx - 20) + 'px,' + (ry - 20) + 'px)';
    requestAnimationFrame(render);
  }
  render();

  initCursorHovers();
}

function initCursorHovers() {
  var ring = document.getElementById('curRing');
  if (!ring) return;
  if (window.matchMedia('(pointer:fine)').matches === false) return;

  var hoverEls = document.querySelectorAll('a,button,.cat-card,.filter-chip,.sort-chip,.lang-opt');
  for (var i = 0; i < hoverEls.length; i++) {
    hoverEls[i].addEventListener('mouseenter', function() { ring.classList.add('hover'); });
    hoverEls[i].addEventListener('mouseleave', function() { ring.classList.remove('hover'); });
  }
}

  initAnimations();

  // Register ScrollTrigger for footer
  gsap.registerPlugin(ScrollTrigger);
  gsap.from('.cat-footer', {
    scrollTrigger: {
      trigger: '.cat-footer',
      start: 'top 95%',
      toggleActions: 'play none none none'
    },
    opacity: 0,
    y: 30,
    duration: 0.8,
    ease: 'power3.out'
  });
});
</script>

</body>
